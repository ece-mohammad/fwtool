# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and Test

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
    - name: checkout package
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8 hatch
    #     pip install -r requirements.txt
    #     pip install -r requirements_dev.txt

    - name: Build  with hatch
      run: |
        hatch build

    - name: Run flake8 with hatch
      run: |
        # stop the build if there are Python syntax errors or undefined names
        hatch run flake8 --count --select=E9,F63,F7,F82 --show-source --statistics src
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        hatch run flake8 --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics src

    - name: Run pytest with hatch
      run: |
        hatch test
