# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: local
    hooks:
    -   id: isort
        name: isort
        entry: isort
        language: python
        always_run: true
        pass_filenames: false

    -   id: ruff check
        name: ruff check
        entry: ruff
        args:
        -   check
        language: python
        always_run: true
        pass_filenames: false
        exclude: "tests/.*"

    -   id: ruff check
        name: ruff check
        entry: ruff
        args:
        -   check
        language: python
        always_run: true
        pass_filenames: false
        exclude: "tests/.*"

    -   id: flake8
        name: flake8
        entry: flake8
        args:
        -  src
        - --count
        - --select=E9,F63,F7,F82
        - --show-source
        - --statistics
        - --exit-zero
        - --max-complexity=10
        - --max-line-length=127
        language: python
        always_run: true
        pass_filenames: false
        exclude: "tests/.*"

    -   id: pytest
        name: pytest
        entry: pytest
        args:
        -   -q
        language: python
        always_run: true
        pass_filenames: false
